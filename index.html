<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackAI2 - Gemini Chat</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        .header {
            background: #1a73e8;
            color: white;
            padding: 1.2rem 2rem;
            font-size: 1.5rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header span {
            font-size: 1.8rem;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 0.8rem 1.2rem;
            border-radius: 20px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-end;
            background: #1a73e8;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            align-self: flex-start;
            background: #e9eef3;
            color: #1e1f22;
            border-bottom-left-radius: 4px;
        }
        .loading {
            align-self: flex-start;
            background: #e9eef3;
            color: #5f6368;
            font-style: italic;
            padding: 0.8rem 1.2rem;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            display: flex;
            padding: 1rem 1.5rem 1.5rem;
            background: white;
            border-top: 1px solid #e0e0e0;
            gap: 0.8rem;
        }
        textarea {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #dadce0;
            border-radius: 24px;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border 0.2s;
            min-height: 60px;
            max-height: 150px;
        }
        textarea:focus {
            border-color: #1a73e8;
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 50px;
            width: 80px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1765cc;
        }
        button:disabled {
            background: #a1c2f0;
            cursor: not-allowed;
        }
        .error {
            color: #d93025;
            background: #fce8e6;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            margin-top: 0.5rem;
            align-self: center;
            max-width: 90%;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <span>🧠</span> PackAI2 · Gemini 1.5 Pro
        </div>
        <div class="messages" id="messageArea">
            <div class="message ai-message">
                👋 Hi! I'm your Gemini assistant. Ask me anything.
            </div>
        </div>
        <div class="input-area">
            <textarea id="promptInput" placeholder="Type your message..." rows="2"></textarea>
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const messageArea = document.getElementById('messageArea');
        const promptInput = document.getElementById('promptInput');
        const sendBtn = document.getElementById('sendBtn');

        // Auto-resize textarea
        promptInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // Send message on button click or Ctrl+Enter
        sendBtn.addEventListener('click', sendMessage);
        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                sendMessage();
            }
        });

        async function sendMessage() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            // Display user message
            addMessage(prompt, 'user');
            promptInput.value = '';
            promptInput.style.height = 'auto';
            setLoading(true);

            // Show loading indicator
            const loadingId = showLoading();

            try {
                const response = await fetch('/.netlify/functions/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const data = await response.json();
                removeLoading(loadingId);

                if (!response.ok) {
                    throw new Error(data.error || `Error ${response.status}`);
                }

                addMessage(data.response, 'ai');
            } catch (error) {
                removeLoading(loadingId);
                addMessage(`❌ Error: ${error.message}`, 'error');
            } finally {
                setLoading(false);
            }
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender === 'user' ? 'user-message' : sender === 'ai' ? 'ai-message' : 'error'}`;
            messageDiv.textContent = text;
            messageArea.appendChild(messageDiv);
            scrollToBottom();
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.id = 'loading-' + Date.now();
            loadingDiv.textContent = 'Gemini is thinking...';
            messageArea.appendChild(loadingDiv);
            scrollToBottom();
            return loadingDiv.id;
        }

        function removeLoading(id) {
            const loading = document.getElementById(id);
            if (loading) loading.remove();
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            promptInput.disabled = isLoading;
        }

        function scrollToBottom() {
            messageArea.scrollTop = messageArea.scrollHeight;
        }
    </script>
</body>
</html>
